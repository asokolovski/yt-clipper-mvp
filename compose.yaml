services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

  api:
    build:
      context: .
      target: runtime
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      TEMPORAL_ADDRESS: temporal:7233
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
    command: npm run start
    ports:
      - "3000:3000"
    volumes:
      - clip_storage:/app/storage
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrate
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    restart: "no"

  worker:
    build:
      context: .
      target: runtime
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      TEMPORAL_ADDRESS: temporal:7233
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
    command: npm run worker:start
    volumes:
      - clip_storage:/app/storage
    restart: unless-stopped

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal-database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.29.1
    restart: unless-stopped
    depends_on:
      temporal-database:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-database
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.49.1
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"

volumes:
  clip_storage:
  postgres_data:
  temporal_postgres_data:
