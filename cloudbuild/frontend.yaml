substitutions:
  _REGION: northamerica-northeast2
  _REPOSITORY: yt-clipper
  _TAG: v1

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_TAG}
      - ./frontend

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_TAG}

timeout: 1200s
