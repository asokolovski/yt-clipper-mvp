name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Download the repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed images
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          backend=false
          frontend=false
          migrate=false

          if [[ "$BEFORE_SHA" =~ ^0+$ ]] || ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "The previous revision is unavailable; all images will be built."
            backend=true
            frontend=true
            migrate=true
          else
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
            echo "Changed files:"
            printf '%s\n' "$changed_files"

            while IFS= read -r file; do
              case "$file" in
                src/*|Dockerfile|package.json|package-lock.json|tsconfig.json|.dockerignore|cloudbuild/backend.yaml)
                  backend=true
                  ;;
              esac

              case "$file" in
                frontend/*|cloudbuild/frontend.yaml)
                  frontend=true
                  ;;
              esac

              case "$file" in
                migrations/*|Dockerfile|package.json|package-lock.json|.dockerignore|cloudbuild/migrate.yaml)
                  migrate=true
                  ;;
              esac

              if [[ "$file" == ".github/workflows/release.yml" ]]; then
                backend=true
                frontend=true
                migrate=true
              fi
            done <<< "$changed_files"
          fi

          if [[ "$backend" == true || "$frontend" == true || "$migrate" == true ]]; then
            any=true
          else
            any=false
          fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "migrate=$migrate"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"

      - name: Show the release plan
        env:
          BACKEND_CHANGED: ${{ steps.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.changes.outputs.frontend }}
          MIGRATE_CHANGED: ${{ steps.changes.outputs.migrate }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "backend=$BACKEND_CHANGED"
          echo "frontend=$FRONTEND_CHANGED"
          echo "migrate=$MIGRATE_CHANGED"
          echo "image tag=$IMAGE_TAG"

      - name: Authenticate to Google Cloud
        if: steps.changes.outputs.any == 'true'
        id: auth
        uses: google-github-actions/auth@v1
        with:
          project_id: yt-clipper-gke
          workload_identity_provider: projects/662369844477/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: yt-clipper-github-release@yt-clipper-gke.iam.gserviceaccount.com
      
      - name: Set up Google Cloud CLI
        if: steps.changes.outputs.any == 'true'
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push the selected images
        if: steps.changes.outputs.any == 'true'
        env:
          BACKEND_CHANGED: ${{ steps.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.changes.outputs.frontend }}
          MIGRATE_CHANGED: ${{ steps.changes.outputs.migrate }}
        run: |
          set -euo pipefail

          submit_and_wait() {
            local component="$1"
            local config="$2"
            local build_id
            local status

            echo "Submitting the $component image build."
            build_id="$(
              gcloud builds submit . \
                --config="$config" \
                --substitutions=_TAG="$GITHUB_SHA" \
                --async \
                --format="value(id)"
            )"

            if [[ -z "$build_id" ]]; then
              echo "Cloud Build did not return a build ID for $component."
              return 1
            fi

            echo "Cloud Build ID for $component: $build_id"
            echo "Logs: https://console.cloud.google.com/cloud-build/builds/$build_id?project=yt-clipper-gke"

            while true; do
              status="$(
                gcloud builds describe "$build_id" \
                  --region=global \
                  --format="value(status)"
              )"

              case "$status" in
                SUCCESS)
                  echo "The $component image build succeeded."
                  return 0
                  ;;
                FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                  echo "The $component image build failed with status $status."
                  return 1
                  ;;
                QUEUED|PENDING|WORKING|STATUS_UNKNOWN)
                  echo "The $component image build is $status."
                  sleep 10
                  ;;
                *)
                  echo "Cloud Build returned an unexpected status for $component: $status"
                  return 1
                  ;;
              esac
            done
          }

          if [[ "$BACKEND_CHANGED" == true ]]; then
            submit_and_wait backend cloudbuild/backend.yaml
          fi

          if [[ "$FRONTEND_CHANGED" == true ]]; then
            submit_and_wait frontend cloudbuild/frontend.yaml
          fi

          if [[ "$MIGRATE_CHANGED" == true ]]; then
            submit_and_wait migrate cloudbuild/migrate.yaml
          fi

      - name: Update production image tags
        id: production_tags
        if: steps.changes.outputs.any == 'true'
        env:
          BACKEND_CHANGED: ${{ steps.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.changes.outputs.frontend }}
          MIGRATE_CHANGED: ${{ steps.changes.outputs.migrate }}
          GH_TOKEN: ${{ github.token }}
          KUSTOMIZATION_PATH: k8s/app/overlays/production/kustomization.yaml
          RELEASE_BRANCH: release/production
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          existing_pr="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$RELEASE_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          remote_branch_sha=""
          if git fetch origin "refs/heads/$RELEASE_BRANCH:refs/remotes/origin/$RELEASE_BRANCH"; then
            remote_branch_sha="$(git rev-parse "refs/remotes/origin/$RELEASE_BRANCH")"
          fi

          if [[ -n "$existing_pr" ]]; then
            if [[ -z "$remote_branch_sha" ]]; then
              echo "The open release PR does not have a remote release branch."
              exit 1
            fi

            git switch --force-create "$RELEASE_BRANCH" "refs/remotes/origin/$RELEASE_BRANCH"
            git rebase "$GITHUB_SHA"
          else
            git switch --force-create "$RELEASE_BRANCH" "$GITHUB_SHA"
          fi

          update_tag() {
            local image="$1"

            if ! grep -q "^  - name: $image$" "$KUSTOMIZATION_PATH"; then
              echo "Image $image was not found in $KUSTOMIZATION_PATH."
              exit 1
            fi

            sed -i "/^  - name: $image$/{n;n;s/^    newTag: .*/    newTag: $GITHUB_SHA/;}" "$KUSTOMIZATION_PATH"

            if ! grep -A2 "^  - name: $image$" "$KUSTOMIZATION_PATH" | grep -q "^    newTag: $GITHUB_SHA$"; then
              echo "Failed to update the $image image tag."
              exit 1
            fi
          }

          if [[ "$BACKEND_CHANGED" == true ]]; then
            update_tag backend
          fi

          if [[ "$FRONTEND_CHANGED" == true ]]; then
            update_tag frontend
          fi

          if [[ "$MIGRATE_CHANGED" == true ]]; then
            update_tag migrate
          fi

          if git diff --quiet -- "$KUSTOMIZATION_PATH"; then
            echo "The production image tags already match this release."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --check
          git diff -- "$KUSTOMIZATION_PATH"
          git add "$KUSTOMIZATION_PATH"
          git commit -m "release: deploy ${GITHUB_SHA::12}"

          if [[ -n "$remote_branch_sha" ]]; then
            git push \
              --force-with-lease="refs/heads/$RELEASE_BRANCH:$remote_branch_sha" \
              origin \
              "HEAD:refs/heads/$RELEASE_BRANCH"
          else
            git push --set-upstream origin "$RELEASE_BRANCH"
          fi

          {
            echo "existing_pr=$existing_pr"
            echo "pushed=true"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update the production release PR
        if: steps.production_tags.outputs.pushed == 'true'
        env:
          BACKEND_CHANGED: ${{ steps.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.changes.outputs.frontend }}
          MIGRATE_CHANGED: ${{ steps.changes.outputs.migrate }}
          EXISTING_PR: ${{ steps.production_tags.outputs.existing_pr }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: release/production
        run: |
          set -euo pipefail

          title="Release ${GITHUB_SHA::12} to production"
          body="$(printf '%s\n' \
            "Automated production release for commit \`$GITHUB_SHA\`." \
            "" \
            "Images built in this workflow run:" \
            "- backend: \`$BACKEND_CHANGED\`" \
            "- frontend: \`$FRONTEND_CHANGED\`" \
            "- migrate: \`$MIGRATE_CHANGED\`" \
            "" \
            "Merging this PR updates the desired state watched by Argo CD.")"

          if [[ -n "$EXISTING_PR" ]]; then
            pr_url="$(
              gh api \
                --method PATCH \
                "repos/$GITHUB_REPOSITORY/pulls/$EXISTING_PR" \
                -f title="$title" \
                -f body="$body" \
                --jq .html_url
            )"
            echo "Updated production release PR: $pr_url"
          else
            pr_url="$(
              gh api \
                --method POST \
                "repos/$GITHUB_REPOSITORY/pulls" \
                -f title="$title" \
                -f body="$body" \
                -f head="$RELEASE_BRANCH" \
                -f base=main \
                --jq .html_url
            )"
            echo "Opened production release PR: $pr_url"
          fi
