substitutions:
  _REGION: northamerica-northeast2
  _REPOSITORY: yt-clipper
  _TAG: v1

steps:
  # Build the shared API/worker runtime image.
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - --target
      - runtime
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${_TAG}
      - .

  # Build the database migration image.
  - name: gcr.io/cloud-builders/docker
    id: build-migrate
    args:
      - build
      - --target
      - migrate
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/migrate:${_TAG}
      - .

  # Build the React + NGINX frontend image.
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_TAG}
      - ./frontend

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/migrate:${_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_TAG}

timeout: 1200s
