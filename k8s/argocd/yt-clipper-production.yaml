apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yt-clipper-production
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/asokolovski/yt-clipper-mvp.git
    targetRevision: main
    path: k8s/app/overlays/production

  destination:
    server: https://kubernetes.default.svc
    namespace: yt-clipper

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      